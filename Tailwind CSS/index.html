<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <h1 class="text-[34px] font-bold text-amber-100 p-4 "> /* custom text size, font weight, text color, background color, padding */

        Hello world!
    </h1>

    <!-- box -->
    <div>
        <h1
            class="text-[34px] font-bold text-indigo-400 bg-blue-700 P-4 w-md h-[200px] mx-auto justify-center items-center flex">

            tailwind
        </h1>
    </div>

    <div class="flex gap-4 mx-auto w-[400px] mt-16 ">
        <div class="bg-fuchsia-300 p-4 rounded-2xl">item 1</div>
        <div class="bg-indigo-400 p-4 rounded-2xl">item 2</div>
        <div class="bg-blue-700 p-4 rounded-2xl">item 3</div>
        <div class="bg-gray-200 p-4 rounded-2xl">item 4</div>
    </div>

</body>

</html>
