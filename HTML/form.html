<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
</head>
<body>
    <h2 align="center">tour registration</h2>
    <form action="https://github.com/kh-almikat">
        <fieldset>
            <legend align="center">Personal Information</legend>

            <label>Name:</label><br>
            <input type="text" placeholder="enter your name" required><br><br>

            <label>Email:</label><br>
            <input type="email" placeholder="enter your email" required><br><br>

            <label>Phone:</label><br>
            <input type="number" placeholder="enter your phone number" required><br><br>

            <label>Birthdate:</label><br>
            <input type="date" required><br><br>

            <label>Gender:</label>
            <input type="radio" name="gender" >Male
            <input type="radio" name="gender" >Female <br> <br>

            <label>Address:</label><br>
            <textarea " required></textarea><br><br>

            <label >Vehicle:</label>
            <select required>
                <option >Select a vehicle</option>
                <option >Car</option>
                <option >Truck</option>
                <option ">Motorcycle</option>
            </select><br><br>

            <button type="submit">submit</button>
        </fieldset>
    </form>
</body>
</html>
